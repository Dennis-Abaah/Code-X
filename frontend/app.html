<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CodeLearn</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@100..700,0..1,-50..200,24&display=swap" rel="stylesheet">
  
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#0d59f2",
                    "background-light": "#f5f6f8",
                    "background-dark": "#101622",
                },
                fontFamily: {
                    "display": ["Inter"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
        },
    }
  </script>
  
  <style>
    body {
      min-height: max(884px, 100dvh);
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.fill {
        font-variation-settings: 'FILL' 1;
    }
    
    /* Global Toast Styles */
    .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
    .toast { background: white; color: #0f172a; padding: 14px 20px; border-radius: 9999px; font-weight: 600; font-size: 0.95rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: toastSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    html.dark .toast { background: #1e293b; color: white; border-color: #334155; }
    .toast.success .material-symbols-outlined { color: #22c55e; }
    .toast.error .material-symbols-outlined { color: #ef4444; }
    .toast.info .material-symbols-outlined { color: #3b82f6; }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(-20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-20px) scale(0.9); } }

    /* Spinner */
    .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 16px; }
    .loader { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #0d59f2; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    html.dark .loader { border: 4px solid #334155; border-top-color: #0d59f2; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    })();
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

  <div id="toastContainer" class="toast-container"></div>
  
  <div id="app" class="flex-1 flex flex-col w-full relative"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
